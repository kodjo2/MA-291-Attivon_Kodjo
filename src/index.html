<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Campus Snack Bar</title>
    <link rel="stylesheet" href="./assets/css/main.css" />
    <link rel="stylesheet" href="./assets/css/sales-points.css" />
  </head>

  <body>
    <header class="hero">
      <h1>My Campus Snack Bar</h1>
      <p>MA-291 - JavaScript</p>
    </header>

    <main class="page">
      <section class="toolbar">
        <button id="load-snacks-btn" type="button">Load snacks</button>
        <button id="toggle-sales-points-btn" type="button">
          Afficher les points de vente
        </button>
      </section>

      <section>
        <h2>Nos snacks</h2>
        <div id="feedback" class="feedback" aria-live="polite"></div>
        <div id="snacks-container" class="cards"></div>
      </section>

      <section id="sales-points-section" class="sales-points-section" hidden>
        <h2>Nos points de vente</h2>
        <div
          id="sales-points-feedback"
          class="feedback"
          aria-live="polite"
        ></div>
        <div id="sales-points-grid" class="sales-points-grid"></div>
      </section>
    </main>

    <script type="module" src="./assets/js/main.js"></script>
  </body>
</html>
